appId: com.mediadock.desktop
productName: MediaDock
copyright: Copyright © MediaDock

# Electron is hoisted to repo root node_modules; pin so builder resolves without workspace-local electron.
electronVersion: 35.7.5

directories:
  output: release-out

asar: true

files:
  - src/**/*
  - package.json

extraResources:
  - from: bundle-dist/web
    to: mediadock/web
  - from: bundle-dist/api
    to: mediadock/api

win:
  # MSI (WiX) needs a real .ico; use build/icon.ico (copy from web favicon in repo or after web:build).
  icon: build/icon.ico
  # Unsigned artifacts: avoids winCodeSign cache extract (symlinks) failing without Developer Mode/admin.
  signAndEditExecutable: false
  target:
    - nsis
    - portable
    - msi

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

msi:
  oneClick: false
  perMachine: false
  createDesktopShortcut: true

mac:
  target:
    - dmg
  category: public.app-category.utilities

linux:
  target:
    - AppImage
  category: Utility
