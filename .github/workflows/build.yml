name: build
on:
  push:
    branches: [main]
  pull_request:

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - run: dotnet restore MediaDock.sln
      - run: dotnet build MediaDock.sln -c Release --no-restore
      - run: dotnet test MediaDock.sln -c Release --no-build

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build:spa-hosted
